version: '3.8'

services:
  web:
    build: .

    ports:
      - "8080:80"

    volumes:
      - ./htdocs:/var/www/html


  mysql:
    image: mysql:8.0
    container_name: mysql_container

    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: log_pipeline

    ports:
      - "3308:3306"

    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin_container

    environment:
      PMA_HOST: mysql
      MYSQL_ROOT_PASSWORD: password

    ports:
      - "8081:80"

    depends_on:
      - mysql

volumes:
  mysql_data: